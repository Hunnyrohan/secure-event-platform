name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend - lint, test, audit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: event_platform_test
          POSTGRES_USER: event_app
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U event_app"
          --health-interval 10s --health-timeout 5s --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      JWT_ACCESS_SECRET: ci_access_secret_at_least_32_characters_long
      JWT_REFRESH_SECRET: ci_refresh_secret_at_least_32_characters_long
      DATA_ENCRYPTION_KEY: 00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
      PGHOST: localhost
      PGUSER: event_app
      PGPASSWORD: test_password
      PGDATABASE: event_platform_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit & integration tests
        run: npm test
      - name: Dependency security audit
        run: npm audit --audit-level=high || true   # report but don't hard-fail coursework builds

  frontend:
    name: Frontend - lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  codeql:
    name: CodeQL static analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t sep-backend ./backend
      - name: Build frontend image
        run: docker build -t sep-frontend ./frontend
