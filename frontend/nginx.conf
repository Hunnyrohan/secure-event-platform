server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers for the static app shell (defence-in-depth alongside
  # the API's own Helmet headers).
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  # script-src / frame-src / connect-src allow Google reCAPTCHA (v2 checkbox);
  # everything else stays same-origin. Keeps XSS surface minimal while letting
  # the CAPTCHA widget load.
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' https://www.google.com https://www.gstatic.com; frame-src https://www.google.com; connect-src 'self' https://www.google.com; frame-ancestors 'none'; base-uri 'self'" always;

  # Proxy API calls to the backend container so cookies stay same-origin.
  location /api/ {
    proxy_pass http://backend:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
